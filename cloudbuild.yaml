steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-west1-docker.pkg.dev/$PROJECT_ID/my-github-repo/my-app:$COMMIT_SHA', '.']
  
  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-west1-docker.pkg.dev/$PROJECT_ID/my-github-repo/my-app:$COMMIT_SHA']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'my-app'
      - '--image'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/my-github-repo/my-app:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--allow-unauthenticated'

images:
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/my-github-repo/my-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY